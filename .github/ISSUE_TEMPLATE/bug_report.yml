name: 🐛 Bug Report
description: Create a structured report to help us reproduce and fix the engine bug.
title: "[BUG] "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report this! Please ensure you are running the **latest version** before submitting.

  - type: input
    id: version
    attributes:
      label: AK Scraper Version
      description: What version of the scraper are you running? (e.g., v1.0.15)
      placeholder: v1.0.15
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      description: What environment did this crash occur on?
      options:
        - Windows (.exe)
        - Windows (Node source)
        - Ubuntu / Debian (Binary)
        - Ubuntu / Debian (Node source)
        - macOS
        - Other (Specify in Context)
    validations:
      required: true

  - type: input
    id: command
    attributes:
      label: CLI Execution Command
      description: Exactly what command did you type into your terminal that triggered the bug?
      placeholder: akscraper -s links.txt -w 100 -p http
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description of the Bug
      description: A clear and concise description of what the bug is.
      placeholder: When I execute the scanner with 150 workers, the validation engine pauses at 99% indefinitely.
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Terminal Output / Error Logs
      description: Paste any physical error logs or Stack Traces here.
      render: shell
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Add any other context about the problem here (e.g., VPNs, Network restrictions).
    validations:
      required: false
