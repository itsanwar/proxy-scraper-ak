name: Cross-Platform Build & Release

on:
  push:
    tags:
      - 'v*' # Triggers automatically when pushing tags (e.g., git tag v1.0.0; git push origin v1.0.0)
  workflow_dispatch: # Allows manual trigger from the Actions tab

jobs:
  build-and-release:
    name: Build for ${{ matrix.osName }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            osName: Linux
            cmd: npm run build:linux
            artifact: akscraper-linux
          - os: windows-latest
            osName: Windows
            cmd: npm run build:windows
            artifact: akscraper-windows.exe
          - os: macos-latest
            osName: macOS
            cmd: npm run build:macos
            artifact: akscraper-macos

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Binary
        run: ${{ matrix.cmd }}

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        with:
          files: ${{ matrix.artifact }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
